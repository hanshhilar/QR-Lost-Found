<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #0e0f0d;
            --surface: #161714;
            --border:  rgba(255,255,255,0.07);
            --green:   #a8e063;
            --text:    #e8e6df;
            --muted:   #7a7870;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 180px;
            pointer-events: none;
            z-index: 0;
        }

        /* radial glow behind card */
        body::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(168,224,99,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
            to   { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
        }

        .wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 400px;
            text-align: center;
            animation: up 0.7s cubic-bezier(.22,.68,0,1.1) both;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* check icon */
        .check-ring {
            width: 72px; height: 72px;
            border-radius: 50%;
            border: 1px solid rgba(168,224,99,0.25);
            background: rgba(168,224,99,0.06);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 2rem;
            animation: pop 0.5s 0.2s cubic-bezier(.22,.68,0,1.5) both;
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.3); }
            to   { opacity: 1; transform: scale(1); }
        }

        .checkmark {
            width: 28px; height: 28px;
            stroke: var(--green);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 36;
            stroke-dashoffset: 36;
            animation: draw 0.45s 0.6s ease forwards;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.6rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 0.75rem;
            letter-spacing: -0.01em;
            line-height: 1.1;
        }

        .desc {
            font-size: 15px;
            color: var(--muted);
            line-height: 1.65;
            font-weight: 300;
            margin-bottom: 2.25rem;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadein 0.5s 1s ease both;
        }

        @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1.8s 1s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .status-text {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--green);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
            animation: fadein 0.5s 0.9s ease both;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .footnote {
            font-size: 12px;
            color: #3d3f3a;
            font-weight: 300;
            letter-spacing: 0.02em;
            animation: fadein 0.5s 1.1s ease both;
            opacity: 0;
            animation-fill-mode: forwards;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="check-ring">
            <svg class="checkmark" viewBox="0 0 24 24">
                <polyline points="4 13 9 18 20 7"/>
            </svg>
        </div>

        <h1>Message<br>delivered.</h1>
        <p class="desc">The owner has been notified. You're a good person for helping out — they'll be in touch soon.</p>

        <div class="status-row">
            <span class="status-dot"></span>
            <span class="status-text">Notification sent</span>
        </div>

        <div class="divider"></div>
        <p class="footnote">You may now close this page.</p>
    </div>
</body>
</html>
