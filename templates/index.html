<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Found an Item?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0e0f0d;
            --surface:  #161714;
            --border:   rgba(255,255,255,0.07);
            --green:    #a8e063;
            --green-dim:#6aab2e;
            --text:     #e8e6df;
            --muted:    #7a7870;
            --input-bg: #1c1e1a;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* background grain */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 180px;
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 460px;
            animation: up 0.7s cubic-bezier(.22,.68,0,1.1) both;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* top accent line */
        .accent-bar {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            border-radius: 999px;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadein 0.6s 0.4s ease forwards;
        }

        @keyframes fadein { to { opacity: 1; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
        }

        .tag-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(168,224,99,0.08);
            border: 1px solid rgba(168,224,99,0.2);
            color: var(--green);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 999px;
            margin-bottom: 1.5rem;
        }

        .tag-pill::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4rem;
            font-weight: 500;
            line-height: 1.15;
            color: var(--text);
            margin-bottom: 0.6rem;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.65;
            margin-bottom: 2rem;
            font-weight: 300;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 1.75rem;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }

        input::placeholder, textarea::placeholder { color: #3d3f3a; }

        input:focus, textarea:focus {
            border-color: rgba(168,224,99,0.4);
            box-shadow: 0 0 0 3px rgba(168,224,99,0.06);
        }

        .field { margin-bottom: 12px; }

        button {
            width: 100%;
            margin-top: 1.25rem;
            padding: 14px;
            background: var(--green);
            color: #0e0f0d;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '→';
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            transition: right 0.2s;
        }

        button:hover { background: #bff077; }
        button:hover::after { right: 14px; }
        button:active { transform: scale(0.985); }

        .note {
            text-align: center;
            font-size: 11px;
            color: #3d3f3a;
            margin-top: 1.25rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="accent-bar"></div>
        <div class="card">
            <span class="tag-pill">Tag TAG100</span>
            <h1>You found something.</h1>
            <p class="subtitle">This item has a registered owner. Send them a quick message below — they'll be notified instantly.</p>
            <div class="divider"></div>

            <form action="/send-message" method="POST">
                <input type="hidden" name="tag_id" value="TAG100">

                <div class="row">
                    <div>
                        <label>Your name</label>
                        <input type="text" name="finder_name" placeholder="Optional">
                    </div>
                    <div>
                        <label>Your contact</label>
                        <input type="text" name="finder_contact" placeholder="Phone / email">
                    </div>
                </div>

                <div class="field">
                    <label>Message to owner</label>
                    <textarea name="message" rows="4"
                        placeholder="e.g. I found your keys at the college canteen. I'll leave them at the security desk."
                        required></textarea>
                </div>

                <button type="submit">Send Message to Owner</button>
            </form>

            <p class="note">Your message is delivered securely. No account needed.</p>
        </div>
    </div>
</body>
</html>
